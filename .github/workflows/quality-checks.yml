---
name: Quality - Checks

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - '.idea/**'
      - '.gitattributes'
      - '.github/**.json'
      - '.gitignore'
      - '.gitmodules'
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'

concurrency:
  group: quality-checks-${{ github.ref }}-${{ github.event.pull_request.number || 'no-pr' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality - Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle
        with:
          write-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Spotless
        run: ./gradlew spotlessCheck

      - name: Detekt
        run: ./gradlew detekt

      - name: Detekt (KMP metadata)
        continue-on-error: true
        run: |
          ./gradlew detektMetadataCommonMain
          ./gradlew detektMetadataMain
          ./gradlew detektMetadataCommonJvmMain

      - name: Dependency guard
        run: ./gradlew dependencyGuard

      - name: Konsist
        run: ./gradlew :quality:konsist:test
